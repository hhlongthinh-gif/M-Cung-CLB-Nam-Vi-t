<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Chiến Kẹo Ngọt - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #3b82f6;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .notion-grid { 
            background-color: #3b82f6;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 50px 50px; 
        }

        .sudoku-tile { 
            border: 4px solid #ffffff; 
            background-color: #ffffff; 
            border-radius: 8px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .sudoku-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #eff6ff; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        @keyframes happy-shake {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(5deg); }
            75% { transform: translateY(-20px) rotate(5deg); }
        }
        .animate-happy-shake { animation: happy-shake 0.8s ease-in-out infinite; }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }

        .dice-container {
            perspective: 1000px;
            width: 160px;
            height: 160px;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }

        .dice-rolling {
            animation: dice-rotate 0.5s linear infinite;
        }

        @keyframes dice-rotate {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .dice-face {
            position: absolute;
            width: 160px;
            height: 160px;
            background: white;
            border: 8px solid #6366f1;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            color: #4338ca;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .front  { transform: rotateY(0deg) translateZ(80px); }
        .back   { transform: rotateY(180deg) translateZ(80px); }
        .right  { transform: rotateY(90deg) translateZ(80px); }
        .left   { transform: rotateY(-90deg) translateZ(80px); }
        .top    { transform: rotateX(90deg) translateZ(80px); }
        .bottom { transform: rotateX(-90deg) translateZ(80px); }

        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // --- Constants ---
        const BOARD_W = 7; 
        const BOARD_H = 7; 
        const TOTAL_TILES = BOARD_W * BOARD_H; 
        const ZOMBIE_COUNT = 5;
        const BOMB_COUNT = 5;
        const CLOVER_COUNT = 5;
        const TRAP_COUNT = 4;
        const MAX_PLAYER_HEALTH = 3;
        const MAX_ZOMBIE_HEALTH = 2;

        const BASIC_EMOJIS = ['🥷', '💂', '👮', '🕵️', '👩‍🚀', '🦸', '🦹', '👷', '🤺', '⚔️', '🛡️', '🏹'];

        const CHARACTERS = [
            { type: 'wizard', emoji: '🧙🏻‍♀️', name: 'Phù thủy', ability: 'Nếu bước là 1, 1 đối thủ sẽ bị di chuyển lùi ở lượt sau.' },
            { type: 'unicorn', emoji: '🦄', name: 'Kỳ lân', ability: 'Nếu bước là 1, bản thân hoặc đồng đội được x2 số bước ở lượt sau.' },
            { type: 'phoenix', emoji: '🐼', name: 'Gấu trúc', ability: 'Nếu bước là 1, hồi đầy máu cho toàn bộ thành viên trong đội.' },
            { type: 'ninja', emoji: '🥷🏻', name: 'Ninja', ability: 'Nếu bước là 1, cộng thêm 5 bước di chuyển cho bản thân hoặc đồng đội.' },
            { type: 'mermaid', emoji: '🧜🏻‍♂️', name: 'Mỹ nhân ngư', ability: 'Nếu bước là 1, trừ 2 vạch máu của cả 2 thành viên đội đối thủ.' },
            { type: 'dinosaur', emoji: 'Rex', emoji: '🦖', name: 'Khủng long', ability: 'Nếu bước là 1, trừ 5 ô di chuyển của 1 thành viên đội đối thủ.' },
            { type: 'snowman', emoji: '☃️', name: 'Người tuyết', ability: 'Nếu bước là 1, vô hiệu hóa 1 lượt đi của 1 thành viên đội đối thủ.' },
        ];

        // --- State ---
        let state = {
            gameState: 'start', 
            gameMode: 'advanced_manual',
            playerCount: 2,
            diceValue: 1,
            isRolling: false,
            selectionSlot: 0,
            selectedCharacters: [null, null, null, null],
            players: [],
            turnIndex: 0,
            isMoving: false,
            skillTargeting: null,
            isAimingBomb: false,
            zombies: [],
            bombIndices: [],
            zombieSpawnIndices: [],
            cloverIndices: [],
            trapIndices: [],
            hasSeenTrapExplanation: false,
            activeEffect: null,
            victoryInfo: null,
            tileSize: 48,
            appScale: 1.0,
            popups: {
                bomb: { x: 0, y: 0 },
                skill: { x: 0, y: 0 },
                victory: { x: 0, y: 0 }
            }
        };

        // --- Drag Logic ---
        let dragInfo = {
            isDragging: false,
            activePopup: null,
            startX: 0,
            startY: 0
        };

        window.addEventListener('mousemove', (e) => {
            if (!dragInfo.isDragging || !dragInfo.activePopup) return;
            const dx = e.clientX - dragInfo.startX;
            const dy = e.clientY - dragInfo.startY;
            state.popups[dragInfo.activePopup].x += dx;
            state.popups[dragInfo.activePopup].y += dy;
            dragInfo.startX = e.clientX;
            dragInfo.startY = e.clientY;
            render();
        });

        window.addEventListener('mouseup', () => {
            dragInfo.isDragging = false;
            dragInfo.activePopup = null;
        });

        function startDrag(e, type) {
            dragInfo.isDragging = true;
            dragInfo.activePopup = type;
            dragInfo.startX = e.clientX;
            dragInfo.startY = e.clientY;
        }

        // --- Helpers ---
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function getRandomUnique(count, exclude) {
            const res = [];
            while(res.length < count) {
                const r = Math.floor(Math.random() * TOTAL_TILES);
                if (!exclude.includes(r) && !res.includes(r)) res.push(r);
            }
            return res;
        }

        function getBoardSpaces(tileSize) {
            const spaces = [];
            for (let r = 0; r < BOARD_H; r++) {
                const isReversed = r % 2 !== 0;
                const y = (BOARD_H - 1 - r) * tileSize;
                if (!isReversed) {
                    for (let c = 0; c < BOARD_W; c++) {
                        spaces.push({ id: spaces.length, x: c * tileSize, y: y });
                    }
                } else {
                    for (let c = BOARD_W - 1; c >= 0; c--) {
                        spaces.push({ id: spaces.length, x: c * tileSize, y: y });
                    }
                }
            }
            return spaces;
        }

        // --- Game Actions ---
        function initGame(chars) {
            let charsToUse = [];
            if (state.gameMode.startsWith('basic')) {
                const shuffledEmojis = [...BASIC_EMOJIS].sort(() => Math.random() - 0.5);
                charsToUse = Array.from({ length: state.playerCount }).map((_, i) => ({
                    type: 'wizard',
                    emoji: shuffledEmojis[i % shuffledEmojis.length],
                    name: `Người chơi ${i + 1}`,
                    ability: 'Không có kỹ năng'
                }));
            } else {
                charsToUse = (chars || state.selectedCharacters).filter(c => c !== null);
            }

            const startExclude = [0, TOTAL_TILES - 1];
            const bInd = getRandomUnique(BOMB_COUNT, startExclude);
            const zInd = getRandomUnique(ZOMBIE_COUNT, [...startExclude, ...bInd]);
            const cInd = getRandomUnique(CLOVER_COUNT, [...startExclude, ...bInd, ...zInd]);
            const tInd = getRandomUnique(TRAP_COUNT, [...startExclude, ...bInd, ...zInd, ...cInd]);

            const initialPlayers = charsToUse.map((char, i) => ({
                id: i,
                team: i < Math.ceil(charsToUse.length / 2) ? 1 : 2,
                character: char,
                pos: 0,
                health: MAX_PLAYER_HEALTH,
                maxHealth: MAX_PLAYER_HEALTH,
                bombs: 0,
                statusEffects: {}
            }));

            setState({
                bombIndices: bInd,
                zombieSpawnIndices: zInd,
                cloverIndices: cInd,
                trapIndices: tInd,
                zombies: [],
                turnIndex: 0,
                isMoving: false,
                victoryInfo: null,
                players: initialPlayers,
                gameState: 'playing'
            });
            updateTileSize();
        }

        function updateTileSize() {
            const sidebarWidth = state.gameState === 'playing' ? 640 : 0;
            const availableW = (window.innerWidth - sidebarWidth - 40);
            const availableH = (window.innerHeight - 40);
            const horizontalLimit = availableW / BOARD_W;
            const verticalLimit = availableH / BOARD_H;
            const bestSize = Math.max(40, Math.min(horizontalLimit, verticalLimit, 150));
            setState({ tileSize: bestSize });
        }

        function rollDice() {
            if (state.isRolling || state.isMoving) return;
            setState({ isRolling: true });
            let count = 0;
            const interval = setInterval(() => {
                setState({ diceValue: Math.floor(Math.random() * 6) + 1 });
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const finalValue = Math.floor(Math.random() * 6) + 1;
                    setState({ diceValue: finalValue, isRolling: false });
                    handleMove(finalValue);
                }
            }, 80);
        }

        async function handleMove(steps) {
            if (state.isMoving) return;
            const p = state.players[state.turnIndex];
            if (steps === 1) {
                if (['phoenix', 'mermaid'].includes(p.character.type) || state.gameMode.startsWith('basic')) {
                    await executeMove(p, steps);
                    return;
                }
                setState({ skillTargeting: { steps, player: p } });
                return;
            }
            await executeMove(p, steps);
        }

        async function executeMove(p, steps, skillTargetId, isExtraMove = false) {
            if (!isExtraMove) setState({ isMoving: true });
            try {
                let currentSteps = steps;
                let currentPos = p.pos;
                
                const modifier = p.statusEffects.nextTurnModifier;
                if (modifier === 'double' || modifier === 'x2') currentSteps *= 2;
                else if (modifier === 'reverse' || modifier === 'backward') currentSteps = -currentSteps;
                else if (modifier === 'skip' || modifier === 'disabled') {
                    state.players = state.players.map(pl => pl.id === p.id ? { ...pl, statusEffects: { ...pl.statusEffects, nextTurnModifier: undefined, statusMessage: undefined } } : pl);
                    if (!isExtraMove) {
                        const nextTurn = (state.turnIndex + 1) % state.players.length;
                        setState({ turnIndex: nextTurn });
                        if (nextTurn === 0) moveZombies();
                    }
                    return;
                } else if (modifier === 'plus5') {
                    currentSteps += 5;
                } else if (modifier === 'minus5') {
                    currentSteps = Math.max(1, currentSteps - 5);
                }

                state.players = state.players.map(pl => pl.id === p.id ? { ...pl, statusEffects: { ...pl.statusEffects, nextTurnModifier: undefined } } : pl);

                const direction = currentSteps > 0 ? 1 : -1;
                const absSteps = Math.abs(currentSteps);
                
                for (let i = 0; i < absSteps; i++) {
                    currentPos += direction;
                    if (currentPos < 0) currentPos = 0;
                    if (currentPos >= TOTAL_TILES) currentPos = TOTAL_TILES - 1;
                    
                    if (state.bombIndices.includes(currentPos) && p.bombs < 1) {
                        p.bombs++;
                        state.bombIndices = state.bombIndices.filter(idx => idx !== currentPos);
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
                        audio.volume = 0.4;
                        audio.play().catch(() => {});
                    }

                    state.players = state.players.map(pl => pl.id === p.id ? { ...pl, pos: currentPos, bombs: p.bombs } : pl);
                    render();
                    await new Promise(r => setTimeout(r, 200));
                    if (currentPos === TOTAL_TILES - 1) break;
                }

                state.players = state.players.map(pl => pl.id === p.id ? { ...pl, statusEffects: { ...pl.statusEffects, statusMessage: undefined } } : pl);

                if (steps === 1 && !state.gameMode.startsWith('basic')) {
                    await applySkill(p, skillTargetId);
                }

                const finalPos = currentPos;
                if (state.cloverIndices.includes(finalPos)) {
                    state.players = state.players.map(pl => pl.id === p.id ? { ...pl, health: Math.min(pl.maxHealth, pl.health + 1) } : pl);
                } else if (state.trapIndices.includes(finalPos)) {
                    setState({ activeEffect: { type: 'trap', pos: finalPos } });
                    await new Promise(r => setTimeout(r, 1000));
                    setState({ activeEffect: null });
                    const backSteps = Math.floor(Math.random() * 8) + 3;
                    await executeMove(p, -backSteps, undefined, true);
                } else if (state.zombieSpawnIndices.includes(finalPos)) {
                    const spawnPos = Math.max(0, finalPos - 6);
                    if (!state.zombies.some(z => z.pos === spawnPos)) {
                        state.zombies.push({ id: Math.random().toString(36).substr(2, 9), pos: spawnPos, health: MAX_ZOMBIE_HEALTH });
                    }
                }

                const zombieAtPos = state.zombies.find(z => z.pos === finalPos);
                if (zombieAtPos) {
                    setState({ activeEffect: { type: 'combat', pos: finalPos } });
                    await new Promise(r => setTimeout(r, 1500));
                    setState({ activeEffect: null });
                    state.players = state.players.map(pl => {
                        if (pl.id === p.id) {
                            const newHealth = pl.health - 1;
                            if (newHealth <= 0) return { ...pl, health: MAX_PLAYER_HEALTH, pos: 0 };
                            return { ...pl, health: newHealth };
                        }
                        return pl;
                    });
                    state.zombies = state.zombies.map(z => z.id === zombieAtPos.id ? { ...z, health: z.health - 1 } : z).filter(z => z.health > 0);
                }

                if (finalPos === TOTAL_TILES - 1) {
                    setState({ victoryInfo: { winnerTeam: p.team, winnerPlayer: p }, gameState: 'victory' });
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else if (!isExtraMove) {
                    const nextTurn = (state.turnIndex + 1) % state.players.length;
                    setState({ turnIndex: nextTurn });
                    if (nextTurn === 0) moveZombies();
                }
            } finally {
                if (!isExtraMove) setState({ isMoving: false });
            }
        }

        async function applySkill(p, targetId) {
            const target = state.players.find(pl => pl.id === targetId);
            switch (p.character.type) {
                case 'wizard':
                    if (target) state.players = state.players.map(pl => pl.id === target.id ? { ...pl, statusEffects: { ...pl.statusEffects, nextTurnModifier: 'backward', statusMessage: `Bị đi lùi từ ${p.character.emoji}` } } : pl);
                    break;
                case 'unicorn':
                    if (target) state.players = state.players.map(pl => pl.id === target.id ? { ...pl, statusEffects: { ...pl.statusEffects, nextTurnModifier: 'x2', statusMessage: `Nhận x2 bước từ ${p.character.emoji}` } } : pl);
                    break;
                case 'phoenix':
                    state.players = state.players.map(pl => pl.team === p.team ? { ...pl, health: pl.maxHealth } : pl);
                    break;
                case 'ninja':
                    if (target) {
                        state.players = state.players.map(pl => pl.id === target.id ? { ...pl, statusEffects: { ...pl.statusEffects, statusMessage: `Được cộng 5 bước từ ${p.character.emoji}` } } : pl);
                        await executeMove(target, 5, undefined, true);
                    }
                    break;
                case 'mermaid':
                    state.players = state.players.map(pl => {
                        if (pl.team !== p.team) {
                            const newHealth = Math.max(0, pl.health - 2);
                            return { ...pl, health: newHealth <= 0 ? MAX_PLAYER_HEALTH : newHealth, pos: newHealth <= 0 ? 0 : pl.pos };
                        }
                        return pl;
                    });
                    break;
                case 'dinosaur':
                    if (target) {
                        state.players = state.players.map(pl => pl.id === target.id ? { ...pl, statusEffects: { ...pl.statusEffects, statusMessage: `Bị trừ 5 bước từ ${p.character.emoji}` } } : pl);
                        await executeMove(target, -5, undefined, true);
                    }
                    break;
                case 'snowman':
                    if (target) state.players = state.players.map(pl => pl.id === target.id ? { ...pl, statusEffects: { ...pl.statusEffects, nextTurnModifier: 'disabled', statusMessage: `Bị đóng băng lượt từ ${p.character.emoji}` } } : pl);
                    break;
            }
        }


        async function moveZombies() {
            const steps = 2;
            for (let s = 0; s < steps; s++) {
                state.zombies = state.zombies.map(z => ({ ...z, pos: z.pos + 1 }));
                state.players = state.players.map(p => {
                    const collidingZombie = state.zombies.find(z => z.pos === p.pos);
                    if (collidingZombie) {
                        const newHealth = p.health - 1;
                        if (newHealth <= 0) return { ...p, health: MAX_PLAYER_HEALTH, pos: 0 };
                        return { ...p, health: newHealth };
                    }
                    return p;
                });
                render();
                await new Promise(r => setTimeout(r, 500));
            }
            const maxPlayerPos = Math.max(...state.players.map(p => p.pos), 0);
            state.zombies = state.zombies.filter(z => z.pos <= maxPlayerPos && z.pos < TOTAL_TILES);
            render();
        }

        function throwBomb(targetId, isZombie) {
            const p = state.players[state.turnIndex];
            if (p.bombs <= 0) return;
            state.players = state.players.map(pl => pl.id === p.id ? { ...pl, bombs: pl.bombs - 1 } : pl);
            if (isZombie) {
                state.zombies = state.zombies.map(z => z.id === targetId ? { ...z, health: Math.max(0, z.health - 2) } : z).filter(z => z.health > 0);
            } else {
                state.players = state.players.map(pl => {
                    if (pl.id === targetId) {
                        const newHealth = Math.max(0, pl.health - 2);
                        return { ...pl, health: newHealth <= 0 ? MAX_PLAYER_HEALTH : newHealth, pos: newHealth <= 0 ? 0 : pl.pos };
                    }
                    return pl;
                });
            }
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
            audio.volume = 0.4;
            audio.play().catch(() => {});
            setState({ isAimingBomb: false });
        }

        // --- Rendering ---
        function render() {
            const app = document.getElementById('app');
            const { gameState } = state;

            if (gameState === 'start') {
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-blue-500 overflow-hidden">
                        <div class="relative z-10 flex flex-col items-center">
                            <h1 class="text-[10vw] md:text-[12vw] font-black mb-12 tracking-tighter text-white drop-shadow-2xl text-center leading-[0.9] uppercase">
                                ĐẠI CHIẾN<br/>KẸO NGỌT
                            </h1>
                            <button onclick="setState({gameState: 'mode_selection'})"
                                class="px-20 py-8 bg-yellow-400 border-8 border-white text-white rounded-3xl font-black text-5xl hover:scale-110 active:scale-95 transition-all shadow-[0_20px_0_#b45309] hover:translate-y-[5px] active:translate-y-[20px] active:shadow-none uppercase tracking-widest flex items-center gap-4">
                                CHƠI NGAY! 🚀
                            </button>
                        </div>
                    </div>
                `;
            } else if (gameState === 'mode_selection') {
                const modes = [
                    { id: 'basic_dice', label: 'Cơ bản - có xí ngầu', icon: '🎲', desc: 'Không chọn chiến binh, dùng xí ngầu máy tính' },
                    { id: 'basic_manual', label: 'Cơ bản - không xí ngầu', icon: '🔢', desc: 'Không chọn chiến binh, tự chọn số bước' },
                    { id: 'advanced_dice', label: 'Nâng cao - có xí ngầu', icon: '🧙‍♀️🎲', desc: 'Có chọn chiến binh, dùng xí ngầu máy tính' },
                    { id: 'advanced_manual', label: 'Nâng cao - không xí ngầu', icon: '🧙‍♀️🔢', desc: 'Có chọn chiến binh, tự chọn số bước' },
                ];
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-indigo-600 p-8 overflow-hidden">
                        <div class="max-w-6xl w-full z-10 bg-white p-12 rounded-[40px] border-8 border-white shadow-2xl flex flex-col items-center">
                            <h2 class="text-5xl font-black text-indigo-600 mb-12 uppercase tracking-widest text-center">CHỌN CHẾ ĐỘ CHƠI</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                                ${modes.map(m => `
                                    <button onclick="setState({gameMode: '${m.id}', gameState: 'player_count'})"
                                        class="group p-8 bg-indigo-50 border-4 border-indigo-100 rounded-3xl hover:border-indigo-500 hover:bg-white transition-all text-left flex items-center gap-6 shadow-sm hover:shadow-xl hover:-translate-y-2">
                                        <div class="text-7xl group-hover:scale-110 transition-transform">${m.icon}</div>
                                        <div>
                                            <div class="text-2xl font-black text-indigo-700 uppercase mb-2">${m.label}</div>
                                            <div class="text-indigo-400 font-bold uppercase text-sm tracking-tight">${m.desc}</div>
                                        </div>
                                    </button>
                                `).join('')}
                            </div>
                            <button onclick="setState({gameState: 'start'})" class="mt-12 text-indigo-300 font-black text-xl uppercase tracking-widest hover:text-indigo-500 transition-colors">Quay lại</button>
                        </div>
                    </div>
                `;
            } else if (gameState === 'player_count') {
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-emerald-500 p-8 overflow-hidden">
                        <div class="max-w-2xl w-full z-10 bg-white p-12 rounded-[40px] border-8 border-white shadow-2xl flex flex-col items-center">
                            <h2 class="text-4xl font-black text-emerald-600 mb-12 uppercase tracking-widest text-center">SỐ NGƯỜI CHƠI</h2>
                            <div class="flex gap-6 mb-12">
                                ${[2, 3, 4, 5, 6].map(n => `
                                    <button onclick="setState({playerCount: ${n}})"
                                        class="w-20 h-20 rounded-2xl border-4 font-black text-3xl transition-all ${state.playerCount === n ? 'bg-emerald-500 border-white text-white scale-110 shadow-lg' : 'bg-emerald-50 border-emerald-100 text-emerald-300 hover:border-emerald-300'}">
                                        ${n}
                                    </button>
                                `).join('')}
                            </div>
                            <button onclick="onPlayerCountContinue()" class="px-20 py-6 bg-emerald-500 border-8 border-white text-white rounded-2xl font-black text-4xl hover:scale-110 active:scale-95 transition-all shadow-lg uppercase tracking-widest">TIẾP TỤC! 🚀</button>
                            <button onclick="setState({gameState: 'mode_selection'})" class="mt-8 text-emerald-300 font-black text-xl uppercase tracking-widest hover:text-emerald-500 transition-colors">Quay lại</button>
                        </div>
                    </div>
                `;
            } else if (gameState === 'selection') {
                const allSelected = state.selectedCharacters.every(c => c !== null);
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-pink-500 p-4 md:p-8 overflow-hidden">
                        <div class="max-w-[95vw] w-full h-[90vh] z-10 bg-white p-6 md:p-10 rounded-3xl border-8 border-white shadow-2xl flex flex-col items-center relative overflow-y-auto custom-scrollbar">
                            <div class="flex justify-between items-center w-full mb-8">
                                <h2 class="text-3xl font-black text-pink-600 uppercase tracking-widest">CHỌN CHIẾN BINH</h2>
                                <div class="px-6 py-2 rounded-full border-2 border-white text-lg font-black text-white shadow-sm ${state.selectionSlot < Math.ceil(state.playerCount / 2) ? 'bg-blue-500' : 'bg-pink-600'}">
                                    LƯỢT CHỌN: ${state.selectionSlot < Math.ceil(state.playerCount / 2) ? 'ĐỘI 1' : 'ĐỘI 2'}
                                </div>
                            </div>
                            <div class="flex flex-wrap justify-center w-full mb-12 gap-8">
                                ${state.selectedCharacters.map((char, i) => {
                                    const team = i < Math.ceil(state.playerCount / 2) ? 1 : 2;
                                    const isCurrent = state.selectionSlot === i;
                                    return `
                                        <button onclick="onCancelSelection(${i})"
                                            class="w-24 h-32 rounded-xl border-4 flex flex-col items-center justify-center text-5xl shadow-sm transition-all relative group ${isCurrent ? (team === 1 ? 'border-blue-400 bg-blue-50 scale-110' : 'border-pink-400 bg-pink-50 scale-110') : (team === 1 ? 'border-blue-100 bg-white hover:bg-red-50 hover:border-red-200' : 'border-pink-100 bg-white hover:bg-red-50 hover:border-red-200')}">
                                            ${char?.emoji || '?'}
                                            <div class="text-[10px] font-black absolute bottom-2 uppercase ${team === 1 ? 'text-blue-400' : 'text-pink-400'}">Đội ${team}</div>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                            <div class="grid grid-cols-7 gap-4 w-full mb-8">
                                ${CHARACTERS.map(char => {
                                    const isSelected = state.selectedCharacters.some(sc => sc?.type === char.type);
                                    return `
                                        <button ${isSelected || allSelected ? 'disabled' : ''} onclick="onSelectCharacter('${char.type}')"
                                            class="flex flex-col items-center p-4 rounded-xl border-4 transition-all group relative h-64 ${isSelected ? 'bg-gray-100 border-gray-200 opacity-50 grayscale cursor-not-allowed' : 'bg-blue-50 border-blue-200 hover:border-blue-500 hover:scale-105'}">
                                            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform">${char.emoji}</div>
                                            <div class="text-lg font-black text-blue-700 uppercase tracking-tighter mb-2 text-center leading-none">${char.name}</div>
                                            <div class="text-[9px] text-blue-900 font-bold text-center leading-tight uppercase tracking-tight">${char.ability}</div>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                            ${allSelected ? `<button onclick="initGame()" class="px-24 py-6 bg-green-500 border-8 border-white text-white rounded-2xl font-black text-4xl hover:scale-110 active:scale-95 transition-all shadow-lg uppercase tracking-widest animate-pulse">LAUNCH 🚀</button>` : ''}
                        </div>
                    </div>
                `;
            } else if (gameState === 'playing') {
                const currentPlayer = state.players[state.turnIndex];
                const spaces = getBoardSpaces(state.tileSize);

                app.innerHTML = `
                    <div class="h-screen w-screen flex bg-blue-500 overflow-hidden">
                        <!-- Left Panel: Team 1 -->
                        <div class="w-80 h-full bg-white border-r-4 border-white p-4 flex flex-col z-50 shadow-md overflow-y-auto custom-scrollbar">
                            <div class="text-3xl font-black text-blue-600 uppercase mb-6 flex items-center gap-3">🔵 ĐỘI 1</div>
                            <div class="flex flex-col gap-4 flex-1">
                                ${state.players.filter(p => p.team === 1).map(p => renderPlayerCard(p)).join('')}
                            </div>
                        </div>

                        <!-- Middle Panel: Board -->
                        <div class="flex-1 relative overflow-hidden flex items-center justify-center notion-grid">
                            ${renderActivePlayerCorner(currentPlayer)}
                            ${renderDiceUI()}
                            ${renderBombTargeting()}
                            ${renderSkillTargeting()}
                            ${renderActiveEffects()}
                            
                            <div class="relative" style="width: ${BOARD_W * state.tileSize}px; height: ${BOARD_H * state.tileSize}px;">
                                ${spaces.map(s => renderBoardTile(s)).join('')}
                                ${state.zombies.map(z => renderZombie(z, spaces)).join('')}
                                ${state.players.map(p => renderPlayerOnBoard(p, spaces)).join('')}
                            </div>
                        </div>

                        <!-- Right Panel: Team 2 -->
                        <div class="w-80 h-full bg-white border-l-4 border-white p-4 flex flex-col z-50 shadow-md overflow-y-auto custom-scrollbar">
                            <div class="text-3xl font-black text-pink-600 uppercase mb-6 flex items-center gap-3 justify-end">ĐỘI 2 🔴</div>
                            <div class="flex flex-col gap-4 flex-1">
                                ${state.players.filter(p => p.team === 2).map(p => renderPlayerCard(p)).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (gameState === 'victory') {
                const v = state.victoryInfo;
                app.innerHTML = `
                    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 p-4">
                        <div class="bg-white p-10 md:p-20 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-4xl w-full border-[12px] border-yellow-400 relative"
                            style="transform: translate(${state.popups.victory.x}px, ${state.popups.victory.y}px)">
                            <div onmousedown="startDrag(event, 'victory')" class="absolute -top-6 -right-6 text-[100px] cursor-grab active:cursor-grabbing p-4">🏆</div>
                            <h2 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter text-blue-600 uppercase">CHIẾN THẮNG!</h2>
                            <div class="text-2xl md:text-4xl font-black text-pink-600 mb-10 uppercase tracking-widest bg-pink-50 px-10 py-4 rounded-full border-4 border-pink-200">ĐỘI ${v.winnerTeam} THẮNG CUỘC!</div>
                            <div class="flex gap-8 mb-10">
                                ${state.players.filter(pl => pl.team === v.winnerTeam).map(pl => `
                                    <div class="flex flex-col items-center animate-happy-shake">
                                        <div class="text-7xl md:text-9xl mb-4">${pl.character.emoji}</div>
                                        <div class="text-sm md:text-lg font-black uppercase text-blue-600">${pl.character.name}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="setState({gameState: 'start'})" class="px-24 py-10 bg-yellow-400 text-white rounded-3xl font-black text-4xl hover:scale-110 shadow-[0_20px_0_#d97706] uppercase tracking-widest border-8 border-white">START</button>
                        </div>
                    </div>
                `;
            }
        }

        function renderPlayerCard(p) {
            const isTurn = state.turnIndex === p.id;
            return `
                <div class="p-4 rounded-xl border-4 transition-all relative ${isTurn ? 'border-yellow-400 bg-white shadow-md z-10' : 'border-blue-100 bg-blue-50 opacity-90 grayscale'}">
                    <div class="flex items-center gap-4 mb-3 ${p.team === 2 ? 'flex-row-reverse text-right' : ''}">
                        <div class="w-16 h-16 rounded-xl bg-blue-100 flex items-center justify-center text-4xl border-2 border-white ${isTurn ? 'animate-bounce-slow' : ''}">${p.character.emoji}</div>
                        <div class="flex-1 min-w-0">
                            <div class="text-xl font-black text-blue-700 truncate uppercase tracking-tighter">${p.character.name}</div>
                            <div class="text-xs font-black text-pink-500 uppercase tracking-widest bg-white px-2 py-0.5 rounded-full inline-block mt-1">Ô số ${p.pos + 1}</div>
                        </div>
                    </div>
                    <div class="bg-white p-3 rounded-xl mb-3 border border-blue-100 shadow-inner">
                        <div class="text-[9px] font-black uppercase text-blue-400 mb-1">Kỹ năng đặc biệt</div>
                        <div class="text-[11px] font-bold text-blue-800 leading-tight uppercase">${p.character.ability}</div>
                    </div>
                    <div class="flex items-center gap-2 mb-3 ${p.team === 2 ? 'flex-row-reverse' : ''}">
                        ${p.bombs > 0 ? `<button onclick="onAimBomb()" class="flex items-center gap-1 px-3 py-1 rounded-full border-2 bg-red-500 border-white text-white"><span>💣</span><span class="font-black text-sm">x${p.bombs}</span></button>` : ''}
                    </div>
                    <div class="flex items-center justify-between mb-2 ${p.team === 2 ? 'flex-row-reverse' : ''}">
                        <div class="flex gap-1">
                            ${[...Array(p.maxHealth)].map((_, i) => `<div class="w-6 h-3 rounded-full border-2 border-white ${i < p.health ? (p.team === 1 ? 'bg-blue-500' : 'bg-pink-500') : 'bg-gray-200'}"></div>`).join('')}
                        </div>
                        ${isTurn ? `<span class="text-xs font-black text-blue-600 uppercase animate-pulse">Đang đi...</span>` : ''}
                    </div>
                    ${p.statusEffects.statusMessage ? `<div class="mt-2 bg-white/90 p-2 text-[10px] font-black text-purple-700 uppercase rounded-xl border border-purple-200">${p.statusEffects.statusMessage}</div>` : ''}
                    ${isTurn && !state.isMoving && !state.skillTargeting && !state.gameMode.endsWith('dice') ? `
                        <div class="mt-4 pt-4 border-t-4 border-blue-100">
                            <div class="grid grid-cols-3 gap-2">
                                ${[1, 2, 3, 4, 5, 6].map(s => `<button onclick="handleMove(${s})" class="h-12 bg-blue-500 border-b-4 border-blue-700 text-white rounded-[15px] font-black text-xl hover:scale-105 active:translate-y-[4px] active:border-b-0 transition-all shadow-lg flex items-center justify-center border-2 border-white">${s}</button>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderActivePlayerCorner(p) {
            if (!p) return '';
            return `
                <div class="absolute top-8 left-8 z-[60] pointer-events-none">
                    <div class="p-8 rounded-[40px] border-[12px] shadow-2xl w-80 transition-all ${p.team === 1 ? 'bg-blue-600 border-white' : 'bg-pink-600 border-white'}">
                        <div class="flex flex-col items-center text-center">
                            <div class="w-40 h-40 bg-white/20 backdrop-blur-md rounded-[40px] flex items-center justify-center text-8xl mb-6 border-4 border-white/30 animate-bounce-slow">${p.character.emoji}</div>
                            <div class="text-4xl font-black text-white uppercase tracking-tighter mb-2">${p.character.name}</div>
                            <div class="text-sm font-black text-white/80 uppercase tracking-widest mb-6 bg-black/10 px-4 py-1 rounded-full">Đang đến lượt...</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDiceUI() {
            if (!state.gameMode.endsWith('dice') || state.isMoving || state.skillTargeting || state.isAimingBomb) return '';
            return `
                <div class="absolute inset-0 flex items-center justify-center z-[70] pointer-events-none">
                    <div class="flex flex-col items-center gap-8">
                        <button onclick="rollDice()" class="pointer-events-auto group relative flex flex-col items-center justify-center transition-all duration-300 ${state.isRolling ? 'scale-110' : 'hover:scale-105'}">
                            <div class="dice-container">
                                <div class="dice ${state.isRolling ? 'dice-rolling' : ''}" style="transform: ${!state.isRolling ? `rotateX(${(state.diceValue-1) * 90}deg) rotateY(${(state.diceValue-1) * 90}deg)` : ''}">
                                    <div class="dice-face front">⚀</div><div class="dice-face back">⚅</div><div class="dice-face right">⚂</div><div class="dice-face left">⚃</div><div class="dice-face top">⚁</div><div class="dice-face bottom">⚄</div>
                                </div>
                            </div>
                            <div class="mt-24 bg-indigo-600 text-white px-10 py-4 rounded-full font-black text-3xl uppercase tracking-widest border-4 border-white shadow-[0_10px_0_#4338ca]">
                                ${state.isRolling ? 'Đang thảy...' : `Thảy: ${state.diceValue}`}
                            </div>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderBombTargeting() {
            if (!state.isAimingBomb) return '';
            const currentPlayer = state.players[state.turnIndex];
            return `
                <div class="absolute inset-0 z-[100] bg-black/40 flex items-center justify-center pointer-events-none">
                    <div class="bg-white p-8 rounded-2xl border-4 border-red-500 shadow-2xl max-w-xl w-full text-center relative pointer-events-auto"
                        style="transform: translate(${state.popups.bomb.x}px, ${state.popups.bomb.y}px)">
                        <div onmousedown="startDrag(event, 'bomb')" class="absolute -top-6 -right-6 text-6xl animate-bounce cursor-grab p-2">💣</div>
                        <h3 class="text-3xl font-black text-red-700 uppercase mb-4">CHỌN MỤC TIÊU NÉM BOM</h3>
                        <div class="grid grid-cols-2 gap-6 max-h-[60vh] overflow-y-auto p-4 custom-scrollbar">
                            ${state.players.filter(p => p.team !== currentPlayer.team).map(p => `
                                <button onclick="throwBomb(${p.id}, false)" class="p-6 rounded-xl border-4 transition-all flex items-center gap-4 group ${p.team === 1 ? 'border-blue-200 bg-blue-50' : 'border-pink-200 bg-pink-50'}">
                                    <div class="text-5xl">${p.character.emoji}</div>
                                    <div class="text-left"><div class="text-xl font-black uppercase">${p.character.name}</div></div>
                                </button>
                            `).join('')}
                            ${state.zombies.map(z => `
                                <button onclick="throwBomb('${z.id}', true)" class="p-6 rounded-xl border-4 border-gray-200 bg-gray-50 flex items-center gap-4 group">
                                    <div class="text-5xl">🧟</div>
                                    <div class="text-left"><div class="text-xl font-black uppercase">ZOMBIE</div></div>
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="setState({isAimingBomb: false})" class="mt-8 text-gray-400 font-black uppercase">Hủy</button>
                    </div>
                </div>
            `;
        }

        function renderSkillTargeting() {
            if (!state.skillTargeting) return '';
            const { player } = state.skillTargeting;
            return `
                <div class="absolute inset-0 z-[100] bg-black/40 flex items-center justify-center pointer-events-none">
                    <div class="bg-white p-8 rounded-2xl border-4 border-yellow-400 shadow-2xl max-w-xl w-full text-center relative pointer-events-auto"
                        style="transform: translate(${state.popups.skill.x}px, ${state.popups.skill.y}px)">
                        <div onmousedown="startDrag(event, 'skill')" class="absolute -top-6 -right-6 text-6xl animate-bounce cursor-grab p-2">🎯</div>
                        <h3 class="text-3xl font-black text-purple-700 uppercase mb-4">CHỌN MỤC TIÊU</h3>
                        <p class="text-pink-600 font-bold uppercase mb-8">${player.character.ability}</p>
                        <div class="grid grid-cols-2 gap-6">
                            ${state.players.filter(p => {
                                const type = player.character.type;
                                const isTeammate = p.team === player.team;
                                if (['wizard', 'dinosaur', 'snowman'].includes(type)) return !isTeammate;
                                if (['unicorn', 'ninja'].includes(type)) return isTeammate;
                                return true;
                            }).map(p => `
                                <button onclick="onSelectSkillTarget(${p.id})" class="p-6 rounded-xl border-4 transition-all flex items-center gap-4 group ${p.team === 1 ? 'border-blue-200 bg-blue-50' : 'border-pink-200 bg-pink-50'}">
                                    <div class="text-5xl">${p.character.emoji}</div>
                                    <div class="text-left"><div class="text-xl font-black uppercase">${p.character.name}</div></div>
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="onSkipSkill()" class="mt-8 text-gray-400 font-black uppercase">Bỏ qua</button>
                    </div>
                </div>
            `;
        }

        function renderActiveEffects() {
            if (!state.activeEffect) return '';
            return `
                <div class="absolute inset-0 z-[100] pointer-events-none flex items-center justify-center">
                    ${state.activeEffect.type === 'trap' ? `<div class="text-9xl animate-bounce">💥 CHÚ Ý: BẪY!</div>` : ''}
                    ${state.activeEffect.type === 'combat' ? `<div class="text-9xl animate-bounce">⚔️ CHIẾN ĐẤU!!!</div>` : ''}
                </div>
            `;
        }

        function renderBoardTile(s) {
            const isStart = s.id === 0;
            const isGoal = s.id === TOTAL_TILES - 1;
            const isBomb = state.bombIndices.includes(s.id);
            const isZombieSpawn = state.zombieSpawnIndices.includes(s.id);
            const isClover = state.cloverIndices.includes(s.id);
            const isTrap = state.trapIndices.includes(s.id);

            let bgColor = 'bg-blue-50 border-gray-100';
            if (isStart) bgColor = 'bg-green-100 border-green-200';
            else if (isGoal) bgColor = 'bg-yellow-400 border-yellow-600';
            else if (isBomb) bgColor = 'bg-red-100 border-red-200';
            else if (isZombieSpawn) bgColor = 'bg-purple-100 border-purple-200';
            else if (isClover) bgColor = 'bg-emerald-100 border-emerald-200';
            else if (isTrap) bgColor = 'bg-orange-200 border-orange-400';

            return `
                <div class="absolute sudoku-tile flex items-center justify-center ${bgColor}"
                    style="left: ${s.x}px; top: ${s.y}px; width: ${state.tileSize}px; height: ${state.tileSize}px;">
                    <span class="text-[10px] font-black text-blue-600 absolute top-1 left-1">${s.id + 1}</span>
                    ${isStart ? `<span class="text-[12px] font-black text-white uppercase">ĐI</span>` : ''}
                    ${isGoal ? `<span class="text-[12px] font-black text-white uppercase">ĐÍCH</span>` : ''}
                    ${isBomb ? `<span class="text-xl opacity-25">💣</span>` : ''}
                    ${isZombieSpawn ? `<span class="text-xl opacity-25">🧟</span>` : ''}
                    ${isClover ? `<span class="text-xl opacity-25">🍀</span>` : ''}
                    ${isTrap ? `<span class="text-xl opacity-25">🪤</span>` : ''}
                </div>
            `;
        }

        function renderZombie(z, spaces) {
            const s = spaces[z.pos];
            if (!s) return '';
            return `
                <div class="absolute z-20 transition-all duration-400 pointer-events-none"
                    style="left: ${s.x + state.tileSize/2}px; top: ${s.y + state.tileSize/2}px; transform: translate(-50%, -50%);">
                    <div class="flex flex-col items-center">
                        <div class="flex gap-0.5 mb-1 bg-white p-1 rounded-full px-2 border-2 border-red-500">
                            ${[...Array(MAX_ZOMBIE_HEALTH)].map((_, i) => `<div class="w-2 h-2 rounded-full ${i < z.health ? 'bg-red-500' : 'bg-gray-200'}"></div>`).join('')}
                        </div>
                        <span style="font-size: ${state.tileSize * 1.2}px">🧟</span>
                    </div>
                </div>
            `;
        }

        function renderPlayerOnBoard(p, spaces) {
            const s = spaces[p.pos];
            if (!s) return '';
            const isTurn = state.turnIndex === p.id;
            return `
                <div class="absolute z-30 transition-all duration-500 pointer-events-none ${isTurn ? 'scale-150 z-40' : 'opacity-80'}"
                    style="left: ${s.x + state.tileSize/2}px; top: ${s.y + state.tileSize/2}px; transform: translate(-50%, -50%);">
                    <div class="flex flex-col items-center">
                        <div class="flex gap-0.5 mb-1 bg-white p-1 rounded-full px-2 border-2 ${p.team === 1 ? 'border-blue-500' : 'border-pink-500'}">
                            ${[...Array(p.maxHealth)].map((_, i) => `<div class="w-2 h-2 rounded-full ${i < p.health ? (p.team === 1 ? 'bg-blue-500' : 'bg-pink-500') : 'bg-gray-200'}"></div>`).join('')}
                        </div>
                        <span style="font-size: ${state.tileSize * 0.8}px">${p.character.emoji}</span>
                    </div>
                </div>
            `;
        }

        // --- Event Handlers ---
        window.onPlayerCountContinue = () => {
            if (state.gameMode.startsWith('basic')) {
                initGame();
            } else {
                setState({ selectedCharacters: Array(state.playerCount).fill(null), selectionSlot: 0, gameState: 'selection' });
            }
        };

        window.onCancelSelection = (i) => {
            const next = [...state.selectedCharacters];
            next[i] = null;
            setState({ selectedCharacters: next, selectionSlot: i });
        };

        window.onSelectCharacter = (type) => {
            const char = CHARACTERS.find(c => c.type === type);
            const next = [...state.selectedCharacters];
            next[state.selectionSlot] = char;
            const nextEmpty = next.findIndex(c => c === null);
            setState({ selectedCharacters: next, selectionSlot: nextEmpty !== -1 ? nextEmpty : state.selectionSlot });
        };

        window.onAimBomb = () => setState({ isAimingBomb: true });

        window.onSelectSkillTarget = (id) => {
            const { steps, player } = state.skillTargeting;
            setState({ skillTargeting: null });
            executeMove(player, steps, id);
        };

        window.onSkipSkill = () => {
            const { steps, player } = state.skillTargeting;
            setState({ skillTargeting: null });
            executeMove(player, steps);
        };

        // --- Initialization ---
        window.addEventListener('resize', () => {
            const sidebarWidth = state.gameState === 'playing' ? 640 : 0;
            const bestSize = Math.max(40, Math.min((window.innerWidth - sidebarWidth - 40) / BOARD_W, (window.innerHeight - 40) / BOARD_H, 150));
            setState({ tileSize: bestSize });
        });

        render();
    </script>
</body>
</html>
