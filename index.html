<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Chiến Kẹo Ngọt - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #3b82f6;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .notion-grid { 
            background-color: #3b82f6;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 50px 50px; 
        }

        .sudoku-tile { 
            border: 4px solid #ffffff; 
            background-color: #ffffff; 
            border-radius: 8px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            overflow: hidden;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sudoku-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #eff6ff; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        @keyframes happy-shake {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(5deg); }
            75% { transform: translateY(-20px) rotate(5deg); }
        }
        .animate-happy-shake { animation: happy-shake 0.8s ease-in-out infinite; }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }

        .dice-container {
            perspective: 1000px;
            width: 160px;
            height: 160px;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }

        .dice-rolling {
            animation: dice-rotate 0.5s linear infinite;
        }

        @keyframes dice-rotate {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .dice-face {
            position: absolute;
            width: 160px;
            height: 160px;
            background: white;
            border: 8px solid #6366f1;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            color: #4338ca;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .front  { transform: rotateY(0deg) translateZ(80px); }
        .back   { transform: rotateY(180deg) translateZ(80px); }
        .right  { transform: rotateY(90deg) translateZ(80px); }
        .left   { transform: rotateY(-90deg) translateZ(80px); }
        .top    { transform: rotateX(90deg) translateZ(80px); }
        .bottom { transform: rotateX(-90deg) translateZ(80px); }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-5px, 5px) rotate(-5deg); }
            50% { transform: translate(5px, -5px) rotate(5deg); }
            75% { transform: translate(-5px, -5px) rotate(-5deg); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out infinite; }

        @keyframes slide-in-right {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in-right { animation: slide-in-right 0.3s ease-out forwards; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app" class="h-screen w-screen overflow-hidden">
        <!-- Screens will be injected here -->
    </div>

    <script>
        // Constants
        const BOARD_W = 7; 
        const BOARD_H = 7; 
        const TOTAL_TILES = BOARD_W * BOARD_H; 
        const ZOMBIE_COUNT = 5;
        const BOMB_COUNT = 5;
        const CLOVER_COUNT = 5;
        const TRAP_COUNT = 4;
        const MAX_PLAYER_HEALTH = 3;
        const MAX_ZOMBIE_HEALTH = 2;
        const BASIC_EMOJIS = ['🥷', '💂', '👮', '🕵️', '👩‍🚀', '🦸', '🦹', '👷', '🤺', '⚔️', '🛡️', '🏹'];
        const CHARACTERS = [
            { type: 'wizard', emoji: '🧙🏻‍♀️', name: 'Phù thủy', ability: 'Nếu bước là 1, 1 đối thủ sẽ bị di chuyển lùi ở lượt sau.' },
            { type: 'unicorn', emoji: '🦄', name: 'Kỳ lân', ability: 'Nếu bước là 1, bản thân hoặc đồng đội được x2 số bước ở lượt sau.' },
            { type: 'phoenix', emoji: '🐼', name: 'Gấu trúc', ability: 'Nếu bước là 1, hồi đầy máu cho toàn bộ thành viên trong đội.' },
            { type: 'ninja', emoji: '🥷🏻', name: 'Ninja', ability: 'Nếu bước là 1, cộng thêm 5 bước di chuyển cho bản thân hoặc đồng đội.' },
            { type: 'mermaid', emoji: '🧜🏻‍♂️', name: 'Mỹ nhân ngư', ability: 'Nếu bước là 1, trừ 2 vạch máu của cả 2 thành viên đội đối thủ.' },
            { type: 'dinosaur', emoji: '🦖', name: 'Khủng long', ability: 'Nếu bước là 1, trừ 5 ô di chuyển của 1 thành viên đội đối thủ.' },
            { type: 'snowman', emoji: '☃️', name: 'Người tuyết', ability: 'Nếu bước là 1, vô hiệu hóa 1 lượt đi của 1 thành viên đội đối thủ.' },
        ];

        // State
        let state = {
            screen: 'start', // start, mode_selection, player_count, selection, playing, victory
            gameMode: 'advanced_manual',
            playerCount: 2,
            diceValue: 1,
            isRolling: false,
            selectionSlot: 0,
            selectedCharacters: [],
            players: [],
            turnIndex: 0,
            isMoving: false,
            skillTargeting: null,
            isAimingBomb: false,
            zombies: [],
            bombIndices: [],
            zombieSpawnIndices: [],
            cloverIndices: [],
            trapIndices: [],
            hasSeenTrapExplanation: false,
            activeEffect: null,
            victoryInfo: null,
            tileSize: 48,
            notifications: [],
            isShaking: false,
            bombPopupPos: { x: 0, y: 0 },
            skillPopupPos: { x: 0, y: 0 },
            victoryPopupPos: { x: 0, y: 0 }
        };

        // Helper Functions
        function getRandomUnique(count, exclude) {
            const res = [];
            while(res.length < count) {
                const r = Math.floor(Math.random() * TOTAL_TILES);
                if (!exclude.includes(r) && !res.includes(r)) res.push(r);
            }
            return res;
        }

        function addNotification(message, type = 'info', icon = '🔔') {
            const id = Math.random().toString(36).substr(2, 9);
            state.notifications.push({ id, message, type, icon });
            if (type === 'error' || type === 'warning') {
                state.isShaking = true;
                setTimeout(() => { state.isShaking = false; render(); }, 500);
            }
            render();
            setTimeout(() => {
                state.notifications = state.notifications.filter(n => n.id !== id);
                render();
            }, 4000);
        }

        // Game Logic
        function initGame(chars) {
            let charsToUse = [];
            if (state.gameMode.startsWith('basic')) {
                const shuffledEmojis = [...BASIC_EMOJIS].sort(() => Math.random() - 0.5);
                charsToUse = Array.from({ length: state.playerCount }).map((_, i) => ({
                    type: 'wizard',
                    emoji: shuffledEmojis[i % shuffledEmojis.length],
                    name: `Người chơi ${i + 1}`,
                    ability: 'Không có kỹ năng'
                }));
            } else {
                charsToUse = chars.filter(c => c !== null);
            }

            const startExclude = [0, TOTAL_TILES - 1];
            state.bombIndices = getRandomUnique(BOMB_COUNT, startExclude);
            state.zombieSpawnIndices = getRandomUnique(ZOMBIE_COUNT, [...startExclude, ...state.bombIndices]);
            state.cloverIndices = getRandomUnique(CLOVER_COUNT, [...startExclude, ...state.bombIndices, ...state.zombieSpawnIndices]);
            state.trapIndices = getRandomUnique(TRAP_COUNT, [...startExclude, ...state.bombIndices, ...state.zombieSpawnIndices, ...state.cloverIndices]);
            
            state.zombies = [];
            state.turnIndex = 0;
            state.isMoving = false;
            state.victoryInfo = null;
            state.players = charsToUse.map((char, i) => ({
                id: i,
                team: i < Math.ceil(charsToUse.length / 2) ? 1 : 2,
                character: char,
                pos: 0,
                health: MAX_PLAYER_HEALTH,
                maxHealth: MAX_PLAYER_HEALTH,
                bombs: 0,
                statusEffects: {}
            }));
            state.screen = 'playing';
            updateTileSize();
            render();
        }

        function rollDice() {
            if (state.isRolling || state.isMoving) return;
            state.isRolling = true;
            render();
            let count = 0;
            const interval = setInterval(() => {
                state.diceValue = Math.floor(Math.random() * 6) + 1;
                render();
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    state.diceValue = Math.floor(Math.random() * 6) + 1;
                    state.isRolling = false;
                    render();
                    handleMove(state.diceValue);
                }
            }, 80);
        }

        async function moveZombies() {
            const steps = 2;
            for (let s = 0; s < steps; s++) {
                state.zombies = state.zombies.map(z => ({ ...z, pos: z.pos + 1 }));
                
                state.players = state.players.map(p => {
                    const collidingZombie = state.zombies.find(z => z.pos === p.pos);
                    if (collidingZombie) {
                        const newHealth = p.health - 1;
                        if (newHealth === 1) addNotification(`${p.character.name} chỉ còn 1 máu! Cẩn thận!`, 'error', '⚠️');
                        if (newHealth <= 0) {
                            addNotification(`${p.character.name} đã bị Zombie hạ gục!`, 'error', '💀');
                            return { ...p, health: MAX_PLAYER_HEALTH, pos: 0 };
                        }
                        addNotification(`${p.character.name} bị Zombie tấn công!`, 'warning', '🧟');
                        return { ...p, health: newHealth };
                    }
                    return p;
                });

                render();
                await new Promise(r => setTimeout(r, 500));
            }

            const maxPlayerPos = Math.max(...state.players.map(p => p.pos), 0);
            state.zombies = state.zombies.filter(z => z.pos <= maxPlayerPos && z.pos < TOTAL_TILES);
            render();
        }

        async function applySkill(p, targetId) {
            const target = state.players.find(pl => pl.id === targetId);
            switch (p.character.type) {
                case 'wizard':
                    if (target) target.statusEffects = { ...target.statusEffects, nextTurnModifier: 'backward', statusMessage: `Bị đi lùi từ ${p.character.emoji}` };
                    break;
                case 'unicorn':
                    if (target) target.statusEffects = { ...target.statusEffects, nextTurnModifier: 'x2', statusMessage: `Nhận x2 bước từ ${p.character.emoji}` };
                    break;
                case 'phoenix':
                    state.players.forEach(pl => {
                        if (pl.team === p.team) {
                            pl.health = pl.maxHealth;
                            pl.statusEffects.statusMessage = `Được hồi máu từ ${p.character.emoji}`;
                        }
                    });
                    setTimeout(() => {
                        state.players.forEach(pl => { if (pl.team === p.team) pl.statusEffects.statusMessage = undefined; render(); });
                    }, 3000);
                    break;
                case 'ninja':
                    if (target) {
                        target.statusEffects.statusMessage = `Được cộng 5 bước từ ${p.character.emoji}`;
                        render();
                        await executeMove(target, 5, undefined, true);
                        target.statusEffects.statusMessage = undefined;
                    }
                    break;
                case 'mermaid':
                    state.players.forEach(pl => {
                        if (pl.team !== p.team) {
                            pl.health = Math.max(0, pl.health - 2);
                            if (pl.health <= 0) { pl.health = MAX_PLAYER_HEALTH; pl.pos = 0; }
                            pl.statusEffects.statusMessage = `Bị trừ 2 máu từ ${p.character.emoji}`;
                        }
                    });
                    setTimeout(() => {
                        state.players.forEach(pl => { if (pl.team !== p.team) pl.statusEffects.statusMessage = undefined; render(); });
                    }, 3000);
                    break;
                case 'dinosaur':
                    if (target) {
                        target.statusEffects.statusMessage = `Bị trừ 5 bước từ ${p.character.emoji}`;
                        render();
                        await executeMove(target, -5, undefined, true);
                        target.statusEffects.statusMessage = undefined;
                    }
                    break;
                case 'snowman':
                    if (target) target.statusEffects = { ...target.statusEffects, nextTurnModifier: 'disabled', statusMessage: `Bị đóng băng lượt từ ${p.character.emoji}` };
                    break;
            }
            render();
        }

        async function executeMove(p, steps, skillTargetId, isExtraMove = false) {
            if (!isExtraMove) state.isMoving = true;
            render();
            try {
                let currentSteps = steps;
                let currentPos = p.pos;
                const modifier = p.statusEffects.nextTurnModifier;
                
                if (modifier === 'double' || modifier === 'x2') currentSteps *= 2;
                else if (modifier === 'reverse' || modifier === 'backward') currentSteps = -currentSteps;
                else if (modifier === 'skip' || modifier === 'disabled') {
                    p.statusEffects.nextTurnModifier = undefined;
                    p.statusEffects.statusMessage = undefined;
                    if (!isExtraMove) endTurn();
                    return;
                }

                p.statusEffects.nextTurnModifier = undefined;
                const direction = currentSteps > 0 ? 1 : -1;
                const absSteps = Math.abs(currentSteps);
                
                for (let i = 0; i < absSteps; i++) {
                    currentPos += direction;
                    if (currentPos < 0) currentPos = 0;
                    if (currentPos >= TOTAL_TILES) currentPos = TOTAL_TILES - 1;
                    
                    if (state.bombIndices.includes(currentPos) && p.bombs < 1) {
                        p.bombs++;
                        state.bombIndices = state.bombIndices.filter(idx => idx !== currentPos);
                        addNotification(`${p.character.name} đã nhặt được BOM!`, 'success', '💣');
                    }

                    p.pos = currentPos;
                    render();
                    await new Promise(r => setTimeout(r, 200));
                    if (currentPos === TOTAL_TILES - 1) break;
                }

                p.statusEffects.statusMessage = undefined;
                if (steps === 1 && !state.gameMode.startsWith('basic')) {
                    await applySkill(p, skillTargetId);
                }

                const finalPos = currentPos;
                if (state.cloverIndices.includes(finalPos)) {
                    addNotification(`${p.character.name} được hồi 1 máu từ Cỏ 4 Lá!`, 'success', '🍀');
                    p.health = Math.min(p.maxHealth, p.health + 1);
                } else if (state.trapIndices.includes(finalPos)) {
                    addNotification(`${p.character.name} đã đạp trúng BẪY!`, 'error', '🪤');
                    state.activeEffect = { type: 'trap', pos: finalPos };
                    render();
                    await new Promise(r => setTimeout(r, 1000));
                    state.activeEffect = null;
                    const backSteps = Math.floor(Math.random() * 8) + 3;
                    p.statusEffects.statusMessage = `BÙM! Văng lùi ${backSteps} ô`;
                    render();
                    await new Promise(r => setTimeout(r, 500));
                    await executeMove(p, -backSteps, undefined, true);
                } else if (state.zombieSpawnIndices.includes(finalPos)) {
                    addNotification(`Cẩn thận! Zombie đã xuất hiện và đang đuổi theo ${p.character.name}!`, 'warning', '🧟');
                    const spawnPos = Math.max(0, finalPos - 6);
                    if (!state.zombies.some(z => z.pos === spawnPos)) {
                        state.zombies.push({ id: Math.random().toString(36).substr(2, 9), pos: spawnPos, health: MAX_ZOMBIE_HEALTH });
                    }
                }

                const zombieAtPos = state.zombies.find(z => z.pos === finalPos);
                if (zombieAtPos) {
                    addNotification(`${p.character.name} đang chiến đấu với Zombie!`, 'warning', '⚔️');
                    state.activeEffect = { type: 'combat', pos: finalPos };
                    render();
                    await new Promise(r => setTimeout(r, 1500));
                    state.activeEffect = null;
                    p.health -= 1;
                    if (p.health === 1) addNotification(`${p.character.name} chỉ còn 1 máu!`, 'error', '⚠️');
                    if (p.health <= 0) {
                        addNotification(`${p.character.name} đã bị Zombie hạ gục!`, 'error', '💀');
                        p.health = MAX_PLAYER_HEALTH; p.pos = 0;
                        p.statusEffects.statusMessage = 'Bị Zombie hạ gục! Về vạch xuất phát';
                    } else {
                        p.statusEffects.statusMessage = 'Bị Zombie tấn công!';
                    }
                    zombieAtPos.health -= 1;
                    state.zombies = state.zombies.filter(z => z.health > 0);
                }

                if (finalPos === TOTAL_TILES - 1) {
                    state.victoryInfo = { winnerTeam: p.team, winnerPlayer: p };
                    state.screen = 'victory';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else if (!isExtraMove) {
                    endTurn();
                }
            } finally {
                if (!isExtraMove) state.isMoving = false;
                render();
            }
        }

        function endTurn() {
            state.turnIndex = (state.turnIndex + 1) % state.players.length;
            if (state.turnIndex === 0) moveZombies();
            render();
        }

        function handleMove(steps) {
            if (state.isMoving) return;
            const p = state.players[state.turnIndex];
            if (steps === 1) {
                if (['phoenix', 'mermaid'].includes(p.character.type) || state.gameMode.startsWith('basic')) {
                    executeMove(p, steps);
                    return;
                }
                state.skillTargeting = { steps, player: p };
                render();
                return;
            }
            executeMove(p, steps);
        }

        function throwBomb(targetId, isZombie) {
            const p = state.players[state.turnIndex];
            if (p.bombs <= 0) return;
            p.bombs--;
            if (isZombie) {
                addNotification(`Đã ném bom vào Zombie!`, 'success', '💥');
                state.zombies = state.zombies.map(z => z.id === targetId ? { ...z, health: Math.max(0, z.health - 2) } : z).filter(z => z.health > 0);
            } else {
                const target = state.players.find(pl => pl.id === targetId);
                if (target) {
                    addNotification(`Đã ném bom vào ${target.character.name}!`, 'warning', '💥');
                    target.health -= 2;
                    if (target.health === 1) addNotification(`${target.character.name} chỉ còn 1 máu!`, 'error', '⚠️');
                    if (target.health <= 0) {
                        addNotification(`${target.character.name} đã bị hạ gục bởi BOM!`, 'error', '💀');
                        target.health = MAX_PLAYER_HEALTH; target.pos = 0;
                    }
                }
            }
            state.isAimingBomb = false;
            render();
        }

        // UI Rendering
        function updateTileSize() {
            const sidebarWidth = state.screen === 'playing' ? 640 : 0;
            const availableW = window.innerWidth - sidebarWidth - 40;
            const availableH = window.innerHeight - 40;
            const horizontalLimit = availableW / BOARD_W;
            const verticalLimit = availableH / BOARD_H;
            state.tileSize = Math.max(40, Math.min(horizontalLimit, verticalLimit, 150));
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (state.screen === 'start') {
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-blue-500 overflow-hidden">
                        <div class="relative z-10 flex flex-col items-center">
                            <h1 class="text-[10vw] md:text-[12vw] font-black mb-12 tracking-tighter text-white drop-shadow-2xl text-center leading-[0.9] uppercase">
                                ĐẠI CHIẾN<br/>KẸO NGỌT
                            </h1>
                            <button onclick="state.screen = 'mode_selection'; render();" class="px-20 py-8 bg-yellow-400 border-8 border-white text-white rounded-3xl font-black text-5xl hover:scale-110 active:scale-95 transition-all shadow-[0_20px_0_#b45309] hover:translate-y-[5px] active:translate-y-[20px] active:shadow-none uppercase tracking-widest flex items-center gap-4">
                                CHƠI NGAY! 🚀
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'mode_selection') {
                const modes = [
                    { id: 'basic_dice', label: 'Cơ bản - có xí ngầu', icon: '🎲', desc: 'Không chọn chiến binh, dùng xí ngầu máy tính' },
                    { id: 'basic_manual', label: 'Cơ bản - không xí ngầu', icon: '🔢', desc: 'Không chọn chiến binh, tự chọn số bước' },
                    { id: 'advanced_dice', label: 'Nâng cao - có xí ngầu', icon: '🧙‍♀️🎲', desc: 'Có chọn chiến binh, dùng xí ngầu máy tính' },
                    { id: 'advanced_manual', label: 'Nâng cao - không xí ngầu', icon: '🧙‍♀️🔢', desc: 'Có chọn chiến binh, tự chọn số bước' },
                ];
                app.innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center bg-indigo-600 p-8 overflow-hidden">
                        <div class="max-w-6xl w-full z-10 bg-white p-12 rounded-[40px] border-8 border-white shadow-2xl flex flex-col items-center">
                            <h2 class="text-5xl font-black text-indigo-600 mb-12 uppercase tracking-widest text-center">CHỌN CHẾ ĐỘ CHƠI</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                                ${modes.map(m => `
                                    <button onclick="state.gameMode = '${m.id}'; state.screen = 'player_count'; render();" class="group p-8 bg-indigo-50 border-4 border-indigo-100 rounded-3xl hover:border-indigo-500 hover:bg-white transition-all text-left flex items-center gap-6 shadow-sm hover:shadow-xl hover:-translate-y-2">
                                        <div class="text-7xl group-hover:scale-110 transition-transform">${m.icon}</div>
                                        <div>
                                            <div class="text-2xl font-black text-indigo-700 uppercase mb-2">${m.label}</div>
                                            <div class="text-indigo-400 font-bold uppercase text-sm tracking-tight">${m.desc}</div>
                                        </div>
                                    </button>
                                `).join('')}
                            </div>

        function renderPlayerCard(p) {
            const isCurrent = state.turnIndex === p.id;

            const badgeColorClass = p.team === 1 ? 'text-pink-500' : 'text-blue-500';
            const healthColorClass = p.team === 1 ? 'bg-blue-500' : 'bg-pink-500';
            const btnColorClass = p.team === 1 ? 'bg-blue-500' : 'bg-pink-500';

                    <div class="bg-white p-3 rounded-xl mb-3 border ${p.team === 1 ? 'border-blue-100' : 'border-pink-100'} shadow-inner ${p.team === 2 ? 'text-right' : ''}">

                        <div class="text-[11px] font-bold ${p.team === 1 ? 'text-blue-800' : 'text-pink-800'} leading-tight uppercase tracking-tight">${p.character.ability}</div>

                    ${p.statusEffects.statusMessage ? `
                        <div class="mt-2 bg-gradient-to-r from-[#6366f1] via-[#a855f7] to-[#ec4899] p-0.5 rounded-2xl shadow-[0_0_15px_rgba(168,85,247,0.4)]">

                                    <div class="text-5xl group-hover:scale-110 transition-transform">${p.character.emoji}</div>

                                </button>
                            `).join('')}

                        <button onclick="state.isAimingBomb = false; render();" class="mt-8 text-gray-400 font-black text-lg uppercase tracking-widest hover:text-red-500 transition-colors">Hủy ném bom</button>
                    </div>
                </div>
            `;
        }

        function renderSkillTargeting() {
            if (!state.skillTargeting) return '';
            const { player, steps } = state.skillTargeting;
            return `
                <div class="absolute inset-0 z-[100] bg-black/40 flex items-center justify-center pointer-events-none">
                    <div class="bg-white p-8 rounded-2xl border-4 border-yellow-400 shadow-2xl max-w-xl w-full text-center relative pointer-events-auto">
                        <div class="absolute -top-6 -right-6 text-6xl animate-bounce">🎯</div>
                        <h3 class="text-3xl font-black text-purple-700 uppercase mb-4">CHỌN MỤC TIÊU KỸ NĂNG</h3>
                        <p class="text-pink-600 font-bold uppercase mb-8 text-lg tracking-widest">${player.character.ability}</p>
                        <div class="grid grid-cols-2 gap-6">
                            ${state.players.filter(p => {
                                const charType = player.character.type;
                                const isTeammate = p.team === player.team;
                                if (['wizard', 'dinosaur', 'snowman'].includes(charType)) return !isTeammate;
                                if (['unicorn', 'ninja'].includes(charType)) return isTeammate;
                                return true;
                            }).map(p => `
                                <button onclick="state.skillTargeting = null; executeMove(${JSON.stringify(player).replace(/"/g, '&quot;')}, ${steps}, ${p.id});" class="p-6 rounded-xl border-4 transition-all flex items-center gap-4 group shadow-sm ${p.team === 1 ? 'border-blue-200 hover:border-blue-500 bg-blue-50' : 'border-pink-200 hover:border-pink-500 bg-pink-50'}">
                                    <div class="text-5xl group-hover:scale-110 transition-transform">${p.character.emoji}</div>
                                    <div class="text-left">
                                        <div class="text-xl font-black uppercase ${p.team === 1 ? 'text-blue-600' : 'text-pink-600'}">${p.character.name}</div>
                                        <div class="text-xs font-bold opacity-60 uppercase tracking-widest">Đội ${p.team}</div>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="state.skillTargeting = null; executeMove(${JSON.stringify(player).replace(/"/g, '&quot;')}, ${steps});" class="mt-8 text-gray-400 font-black text-lg uppercase tracking-widest hover:text-pink-500 transition-colors">Bỏ qua kỹ năng</button>

                        <div class="flex flex-col items-center animate-in zoom-in duration-300">
                            <div class="text-9xl animate-bounce">💥</div>
                            <div class="mt-8 bg-black/80 backdrop-blur-md text-white p-8 rounded-3xl border-4 border-orange-500 max-w-md text-center shadow-2xl">
                                <div class="text-3xl font-black text-orange-500 mb-4 uppercase tracking-widest">CẢNH BÁO BẪY!</div>

                                <div class="text-9xl animate-bounce relative z-10">🧟👊💥</div>
                            </div>
                            <div class="mt-8 bg-red-600 text-white px-10 py-4 rounded-full font-black text-4xl uppercase tracking-widest border-4 border-white shadow-2xl animate-pulse">CHIẾN ĐẤU!!!</div>
                        </div>
                    `}
                </div>
            `;

        function renderTile(s) {
            const isStart = s.id === 0;
            const isGoal = s.id === TOTAL_TILES - 1;
            const isBomb = state.bombIndices.includes(s.id);
            const isZombieSpawn = state.zombieSpawnIndices.includes(s.id);
            const isClover = state.cloverIndices.includes(s.id);
            const isTrap = state.trapIndices.includes(s.id);

            let bgColor = '';
            if (isStart) bgColor = 'bg-green-100 border-green-200';
            else if (isGoal) bgColor = 'bg-yellow-400 border-yellow-600';
            else if (isBomb) bgColor = 'bg-red-100 border-red-200';
            else if (isZombieSpawn) bgColor = 'bg-purple-100 border-purple-200';
            else if (isClover) bgColor = 'bg-emerald-100 border-emerald-200';
            else if (isTrap) bgColor = 'bg-orange-200 border-orange-400';
            else {
                const colors = ['bg-blue-50', 'bg-pink-50', 'bg-yellow-50', 'bg-indigo-50', 'bg-teal-50'];
                bgColor = colors[s.id % colors.length] + ' border-gray-100';
            }

            return `
                <div class="sudoku-tile ${bgColor}" style="left: ${s.x}px; top: ${s.y}px; width: ${state.tileSize}px; height: ${state.tileSize}px">
                    <span class="text-[10px] font-black text-blue-600 absolute top-1 left-1 tracking-tighter">${s.id + 1}</span>
                    ${isStart ? '<span class="text-[12px] font-black text-white uppercase tracking-widest">ĐI</span>' : ''}
                    ${isGoal ? '<span class="text-[12px] font-black text-white uppercase tracking-widest">ĐÍCH</span>' : ''}
                    ${isBomb ? '<span class="text-xl drop-shadow-sm opacity-25">💣</span>' : ''}
                    ${isZombieSpawn ? '<span class="text-xl drop-shadow-sm opacity-25">🧟</span>' : ''}
                    ${isClover ? '<span class="text-xl drop-shadow-sm opacity-25">🍀</span>' : ''}
                    ${isTrap ? '<span class="text-xl drop-shadow-sm opacity-25">🪤</span>' : ''}
                </div>
            `;
        }

        function renderZombie(z, boardSpaces) {
            const s = boardSpaces[z.pos];
            if (!s) return '';
            return `
                <div class="absolute z-20 transition-all duration-400 ease-in-out pointer-events-none" style="left: ${s.x + state.tileSize/2}px; top: ${s.y + state.tileSize/2}px; transform: translate(-50%, -50%)">
                    <div class="flex flex-col items-center">
                        <div class="flex gap-0.5 mb-1 bg-white p-1 rounded-full px-2 border-2 border-red-500 shadow-lg">
                            ${Array.from({ length: MAX_ZOMBIE_HEALTH }).map((_, i) => `<div class="w-2 h-2 rounded-full ${i < z.health ? 'bg-red-500' : 'bg-gray-200'}"></div>`).join('')}
                        </div>
                        <span class="drop-shadow-lg animate-pulse" style="font-size: ${state.tileSize * 1.2}px">🧟</span>
                    </div>
                </div>
            `;
        }

        function renderPlayerOnBoard(p, boardSpaces) {
            const s = boardSpaces[p.pos];
            if (!s) return '';
            const isTurn = state.turnIndex === p.id;
            return `
                <div class="absolute z-30 transition-all duration-500 ease-out pointer-events-auto ${isTurn ? 'brightness-110 scale-150 z-40' : 'brightness-90 opacity-80'}" style="left: ${s.x + state.tileSize/2}px; top: ${s.y + state.tileSize/2}px; transform: translate(-50%, -50%); font-size: ${state.tileSize * 0.4}px">
                    <div class="flex flex-col items-center relative">
                        <div class="flex gap-0.5 mb-1 bg-white p-1 rounded-full px-2 border-2 border-blue-500 shadow-lg">
                            ${Array.from({ length: p.maxHealth }).map((_, i) => `<div class="w-2 h-2 rounded-full ${i < p.health ? (p.team === 1 ? 'bg-blue-500' : 'bg-pink-500') : 'bg-gray-200'}"></div>`).join('')}
                        </div>
                        <span class="drop-shadow-lg select-none">${p.character.emoji}</span>
                    </div>
                </div>
            `;
        }

        // Initial Render
        window.addEventListener('resize', () => { updateTileSize(); render(); });
        render();
    </script>
</body>
</html>
